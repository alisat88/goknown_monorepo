version: "3"

services:
  # Frontend Service
  frontend:
    container_name: goknown-frontend
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      # React App Environment Settings
      - REACT_APP_ENVIRONMENT=development
      - REACT_APP_PRODUCTION_API=http://localhost:3333/
      - REACT_APP_DEVELOPMENT_API=http://localhost:3333/
      - REACT_APP_STAGING_API=http://localhost:3333/
      - REACT_APP_BALANCE_API=http://localhost:3333/
      - GENERATE_SOURCEMAP=false
      - REACT_APP_BYPASS_SMS_2FA=true
      - REACT_APP_BYPASS_EMAIL=true
    networks:
      - goknown-network

  # Nginx (reverse proxy)
  nginx:
    image: nginx:alpine
    container_name: goknown-frontend-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
    networks:
      - goknown-network

networks:
  goknown-network:
    driver: bridge 
